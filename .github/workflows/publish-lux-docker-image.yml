name: Build and Deploy Lux Explorer Backend

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch:

concurrency:
  group: lux-explorer-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  docker:
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/luxfi/explorer
      dockerfile: docker/Dockerfile
      platforms: linux/amd64
      build-args: |
        DECODE_NOT_A_CONTRACT_CALLS=false
        MIXPANEL_URL=
        MIXPANEL_TOKEN=
        AMPLITUDE_URL=
        AMPLITUDE_API_KEY=
        BLOCKSCOUT_VERSION=v10.0.1+commit.${{ github.sha }}
        RELEASE_VERSION=10.0.1
    secrets: inherit

  deploy:
    name: Deploy to production
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch deploy credentials from KMS
        id: kms
        env:
          KMS_CLIENT_ID: ${{ secrets.KMS_CLIENT_ID }}
          KMS_CLIENT_SECRET: ${{ secrets.KMS_CLIENT_SECRET }}
          HANZO_API_KEY: ${{ secrets.HANZO_API_KEY }}
          KMS_ENDPOINT: ${{ vars.KMS_ENDPOINT || 'https://kms.hanzo.ai' }}
        run: |
          # Auth: Universal Auth (preferred) or legacy API key
          if [ -n "${KMS_CLIENT_ID}" ] && [ -n "${KMS_CLIENT_SECRET}" ]; then
            HANZO_API_KEY=$(curl -sf "${KMS_ENDPOINT}/api/v1/auth/universal-auth/login" \
              -H "Content-Type: application/json" \
              -d "{\"clientId\":\"${KMS_CLIENT_ID}\",\"clientSecret\":\"${KMS_CLIENT_SECRET}\"}" | jq -r '.accessToken')
          fi
          response=$(curl -sf "${KMS_ENDPOINT}/api/v3/secrets/raw?workspaceId=e1359bf4-31b4-4dfa-bb90-323e2c298ad8&secretPath=/deploy&environment=prod" \
            -H "Authorization: Bearer ${HANZO_API_KEY}" 2>/dev/null || echo "")
          if [ -n "$response" ]; then
            token=$(echo "$response" | jq -r '.secrets[] | select(.secretKey=="DO_API_TOKEN") | .secretValue // empty')
          fi
          if [ -z "${token:-}" ]; then
            echo "::error::Deploy credentials not found. Set HANZO_API_KEY with KMS access."
            exit 1
          fi
          echo "::add-mask::${token}"
          echo "token=${token}" >> "$GITHUB_OUTPUT"

      - name: Deploy to lux-k8s
        env:
          DO_TOKEN: ${{ steps.kms.outputs.token }}
        run: |
          INSTALL_DIR="$HOME/.local/bin"
          mkdir -p "$INSTALL_DIR"
          export PATH="$INSTALL_DIR:$PATH"
          if ! command -v doctl &>/dev/null; then
            DOCTL_VERSION=$(curl -sI https://github.com/digitalocean/doctl/releases/latest | grep -i '^location:' | sed 's|.*/v||;s/\r//')
            curl -sL "https://github.com/digitalocean/doctl/releases/download/v${DOCTL_VERSION}/doctl-${DOCTL_VERSION}-linux-amd64.tar.gz" | tar xz -C "$INSTALL_DIR"
          fi
          if ! command -v kubectl &>/dev/null; then
            curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl && mv kubectl "$INSTALL_DIR/kubectl"
          fi
          doctl auth init -t "$DO_TOKEN"
          doctl kubernetes cluster kubeconfig save lux-k8s
          # Mainnet explorers
          for dep in explorer-mainnet explorer-zoo explorer-hanzo explorer-spc explorer-pars; do
            kubectl rollout restart deployment/$dep -n lux-mainnet || true
          done
          # Testnet explorers
          for dep in explorer-testnet explorer-zoo-testnet explorer-hanzo-testnet explorer-spc-testnet explorer-pars-testnet; do
            kubectl rollout restart deployment/$dep -n lux-testnet || true
          done
          # Devnet explorers
          for dep in explorer-devnet explorer-zoo-devnet explorer-hanzo-devnet explorer-spc-devnet explorer-pars-devnet; do
            kubectl rollout restart deployment/$dep -n lux-devnet || true
          done
          # Wait for mainnet rollout
          kubectl rollout status deployment/explorer-mainnet -n lux-mainnet --timeout=300s
